---
modules-search: [ local, /usr/lib/calamares/modules ]

instances:
  - id: copyboot
    module: shellprocess
    config: shellprocess-copyboot.conf

sequence:
  - show:
      - welcome
      - locale
      - keyboard
      - partition
      - users
      - summary
  - exec:
      - partition
      - mount
      - unpackfs
      - machineid
      - fstab
      - locale
      - keyboard
      - localecfg
      - removeuser
      - users
      - networkcfg
      - hwclock
      - services-systemd
      - packages
      - shellprocess@copyboot
      - shellprocess
      - bootloader
      - umount
  - show:
      - finished

branding: bytefall
prompt-install: false
dont-chroot: false
oem-setup: false
disable-cancel: false
disable-cancel-during-exec: true
hide-back-and-next-during-exec: false
quit-at-end: false
